  - ss_e_op_4               # JOINT_NAMES 14  ss_e_op variant 4
  - ss_e_op_5               # JOINT_NAMES 15  ss_e_op variant 5
  - side_removal_op         # JOINT_NAMES 18  ss_e_op side-removal stub
  - ss_e_op_9               # JOINT_NAMES 19  ss_e_op skip-marker
  - ts_e_p_0                # JOINT_NAMES 20  ts_e_p variant 0
  - ts_e_p_1                # JOINT_NAMES 21  ts_e_p variant 1
  - ts_e_p_2                # JOINT_NAMES 22  ts_e_p variant 2
